<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIRAGE SHROUD</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <p class="eyebrow">MIRAGE SHROUD</p>
        <h1>Session Shield</h1>
      </header>
      <section class="card">
        <label class="toggle-row" for="enabledToggle">
          <span>Protection</span>
          <input id="enabledToggle" type="checkbox" />
          <span class="slider" aria-hidden="true"></span>
        </label>
        <div class="stat">
          <span class="stat-label">Masked entities</span>
          <strong id="maskedCount">0</strong>
        </div>
        <p id="statusText" class="status">Loading active tab…</p>
      </section>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
